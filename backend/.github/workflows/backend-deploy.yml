name: Deploy Backend

on:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:

concurrency:
  group: backend-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    if: github.ref_name == 'main' || github.ref_name == 'staging'
    runs-on: ubuntu-latest
    environment: "Prod & Staging"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache-dependency-path: go.sum

      - name: Test
        run: go test ./...

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        env:
          RAW_AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          RAW_AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          clean() { printf '%s' "$1" | tr -d '[:space:]'; }
          AWS_ACCOUNT_ID="$(clean "$RAW_AWS_ACCOUNT_ID")"
          AWS_REGION="$(clean "$RAW_AWS_REGION")"
          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"

      - name: Build and push image
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          clean() { printf '%s' "$1" | tr -d '[:space:]'; }
          AWS_ACCOUNT_ID="$(clean "$AWS_ACCOUNT_ID")"
          AWS_REGION="$(clean "$AWS_REGION")"
          ECR_REPOSITORY="$(clean "$ECR_REPOSITORY")"
          IMAGE_TAG="$(clean "$IMAGE_TAG")"

          image_uri="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG"
          if aws ecr describe-images \
            --region "$AWS_REGION" \
            --repository-name "$ECR_REPOSITORY" \
            --image-ids imageTag="$IMAGE_TAG" >/dev/null 2>&1; then
            echo "Image already exists: $image_uri"
            echo "IMAGE_URI=$image_uri" >> "$GITHUB_ENV"
            exit 0
          fi

          docker build -f deployments/docker/Dockerfile.app -t "$image_uri" .
          docker push "$image_uri"
          echo "IMAGE_URI=$image_uri" >> "$GITHUB_ENV"

      - name: Select deployment target
        env:
          REF_NAME: ${{ github.ref_name }}
          STAGING_EC2_INSTANCE_ID: ${{ secrets.STAGING_EC2_INSTANCE_ID }}
          PROD_EC2_INSTANCE_ID: ${{ secrets.PROD_EC2_INSTANCE_ID }}
        run: |
          clean() { printf '%s' "$1" | tr -d '[:space:]'; }
          STAGING_EC2_INSTANCE_ID="$(clean "$STAGING_EC2_INSTANCE_ID")"
          PROD_EC2_INSTANCE_ID="$(clean "$PROD_EC2_INSTANCE_ID")"

          if [ "$REF_NAME" = "main" ]; then
            echo "DEPLOY_ENVIRONMENT=prod" >> "$GITHUB_ENV"
            echo "DEPLOY_INSTANCE_ID=$PROD_EC2_INSTANCE_ID" >> "$GITHUB_ENV"
          else
            echo "DEPLOY_ENVIRONMENT=staging" >> "$GITHUB_ENV"
            echo "DEPLOY_INSTANCE_ID=$STAGING_EC2_INSTANCE_ID" >> "$GITHUB_ENV"
          fi

      - name: Deploy on EC2 through SSM
        id: ssm_deploy
        env:
          ENVIRONMENT: ${{ env.DEPLOY_ENVIRONMENT }}
          INSTANCE_ID: ${{ env.DEPLOY_INSTANCE_ID }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
          CERTBOT_EMAIL: ${{ secrets.CERTBOT_EMAIL }}
        run: |
          clean() { printf '%s' "$1" | tr -d '[:space:]'; }
          export INSTANCE_ID="$(clean "$INSTANCE_ID")"
          export AWS_REGION="$(clean "$AWS_REGION")"
          export AWS_ACCOUNT_ID="$(clean "$AWS_ACCOUNT_ID")"
          export ECR_REPOSITORY="$(clean "$ECR_REPOSITORY")"
          export IMAGE_TAG="$(clean "$IMAGE_TAG")"
          export CERTBOT_EMAIL="$(clean "$CERTBOT_EMAIL")"
          set -o pipefail
          bash scripts/dispatch-ssm-deploy.sh 2>&1 | tee "$RUNNER_TEMP/ec2-deploy.log"

      - name: Upload EC2 deploy log
        if: always() && steps.ssm_deploy.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: ec2-deploy-${{ env.DEPLOY_ENVIRONMENT }}-${{ github.sha }}
          path: ${{ runner.temp }}/ec2-deploy.log
          if-no-files-found: ignore
