services:
  redis:
    image: redis:7-alpine
    container_name: app-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    image: ${IMAGE_URI:?IMAGE_URI is required}
    container_name: app-api
    command: ["./api"]
    restart: unless-stopped
    ports:
      - "${HOST_API_PORT:-8080}:${SERVER_PORT:-8080}"
    env_file:
      - path: ${RUNTIME_ENV_FILE:?RUNTIME_ENV_FILE is required}
        format: raw
    environment:
      APP_ENV: ${APP_ENV:?APP_ENV is required}
      SERVER_MODE: release
      SERVER_PORT: ${SERVER_PORT:-8080}
      REDIS_ADDR: redis:6379
      GOMEMLIMIT: 512MiB
      GOGC: 50
    depends_on:
      redis:
        condition: service_healthy

  worker:
    image: ${IMAGE_URI:?IMAGE_URI is required}
    container_name: app-worker
    command: ["./worker"]
    restart: unless-stopped
    env_file:
      - path: ${RUNTIME_ENV_FILE:?RUNTIME_ENV_FILE is required}
        format: raw
    environment:
      APP_ENV: ${APP_ENV:?APP_ENV is required}
      REDIS_ADDR: redis:6379
      GOMEMLIMIT: 256MiB
      GOGC: 50
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:
