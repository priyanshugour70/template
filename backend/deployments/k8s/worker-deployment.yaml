apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-worker
  labels:
    app: app-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-worker
  template:
    metadata:
      labels:
        app: app-worker
    spec:
      containers:
        - name: worker
          image: app-worker:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: app-secrets
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
