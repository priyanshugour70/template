# AWS Amplify Hosting — Next.js SSR (WEB_COMPUTE) with pnpm.
# Console: Framework = Next.js - SSR (not static hosting). App root = repo root (or frontend-web if monorepo).
#
# Required environment variables (Amplify → Environment variables):
#   API_URL=https://staging-api.example.com   (staging branch)
#   API_URL=https://api.example.com           (production branch)
# Browser calls same-origin /api/v1/*; the route handler proxies to API_URL.
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - corepack enable
        - corepack prepare pnpm@10.32.1 --activate
        - pnpm install --frozen-lockfile
    build:
      commands:
        # Amplify console env vars are not visible to Next.js SSR at runtime unless
        # written into .env.production before build.
        # https://docs.aws.amazon.com/amplify/latest/userguide/ssr-environment-variables.html
        - |
          if [ -z "${API_URL:-}" ]; then
            echo "ERROR: Set API_URL in Amplify → Environment variables (branch override for staging)." >&2
            exit 1
          fi
          echo "API_URL=${API_URL}" >> .env.production
          env | grep -E '^NEXT_PUBLIC_' >> .env.production || true
        - pnpm run build
  artifacts:
    # Required for SSR + SSG routes (not `out` static export).
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
